<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>MixSync — Now Playing</title>

<!-- Google Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>
/* ============================================================
   DESIGN TOKENS
   ============================================================ */
:root {
  /* Core palette */
  --bg-deep:        #050507;
  --bg-surface:     #0d0d12;
  --bg-elevated:    #16161e;

  /* Album-derived accent (simulated — in production, extracted via Vibrant.js / Android Palette) */
  --accent-primary:   #7c3aed;   /* violet */
  --accent-secondary: #c026d3;   /* fuchsia */
  --accent-tertiary:  #2563eb;   /* blue */
  --accent-warm:      #f59e0b;   /* amber highlight */

  /* Text */
  --text-primary:   rgba(255, 255, 255, 0.95);
  --text-secondary: rgba(255, 255, 255, 0.55);
  --text-tertiary:  rgba(255, 255, 255, 0.30);

  /* Glass */
  --glass-bg:       rgba(255, 255, 255, 0.06);
  --glass-border:   rgba(255, 255, 255, 0.08);
  --glass-hover:    rgba(255, 255, 255, 0.10);

  /* Spacing scale (4px base) */
  --sp-1: 4px;  --sp-2: 8px;  --sp-3: 12px;
  --sp-4: 16px; --sp-5: 20px; --sp-6: 24px;
  --sp-8: 32px; --sp-10: 40px; --sp-12: 48px;
  --sp-16: 64px;

  /* Typography */
  --font-display: 'Manrope', sans-serif;
  --font-body:    'Inter', sans-serif;

  /* Radius */
  --radius-sm: 8px;
  --radius-md: 14px;
  --radius-lg: 20px;
  --radius-xl: 28px;
  --radius-full: 9999px;

  /* Transitions */
  --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
  --duration-fast: 150ms;
  --duration-normal: 300ms;
  --duration-slow: 500ms;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  font-family: var(--font-body);
  background: var(--bg-deep);
  color: var(--text-primary);
  overflow: hidden;
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
}

/* ============================================================
   PHONE FRAME (for desktop preview)
   ============================================================ */
.phone-frame {
  width: 375px;
  height: 812px;
  position: relative;
  overflow: hidden;
  background: var(--bg-deep);
  border-radius: 44px;
  box-shadow:
    0 0 0 2px rgba(255,255,255,0.06),
    0 40px 80px rgba(0,0,0,0.6),
    0 0 120px rgba(124, 58, 237, 0.08);
}

/* ============================================================
   AMBIENT BACKGROUND — Album-art-derived gradient mesh
   ============================================================ */
.ambient-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
  overflow: hidden;
}

.ambient-bg::before {
  content: '';
  position: absolute;
  width: 200%;
  height: 200%;
  top: -50%;
  left: -50%;
  background:
    radial-gradient(ellipse at 30% 20%, var(--accent-primary) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 60%, var(--accent-secondary) 0%, transparent 45%),
    radial-gradient(ellipse at 50% 90%, var(--accent-tertiary) 0%, transparent 50%);
  opacity: 0.35;
  filter: blur(80px) saturate(1.5);
  animation: ambientShift 12s ease-in-out infinite alternate;
}

.ambient-bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at center 40%, transparent 0%, var(--bg-deep) 70%);
  z-index: 1;
}

@keyframes ambientShift {
  0%   { transform: translate(0, 0) scale(1); }
  33%  { transform: translate(-5%, 3%) scale(1.05); }
  66%  { transform: translate(3%, -2%) scale(0.97); }
  100% { transform: translate(-2%, 5%) scale(1.03); }
}

/* ============================================================
   CONTENT LAYOUT
   ============================================================ */
.now-playing {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: var(--sp-6);
  padding-top: env(safe-area-inset-top, var(--sp-12));
}

/* ============================================================
   TOP BAR
   ============================================================ */
.top-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding-bottom: var(--sp-4);
  flex-shrink: 0;
}

.top-bar__btn {
  width: 40px;
  height: 40px;
  border: none;
  background: var(--glass-bg);
  backdrop-filter: blur(12px) saturate(1.4);
  -webkit-backdrop-filter: blur(12px) saturate(1.4);
  border-radius: var(--radius-full);
  color: var(--text-primary);
  display: grid;
  place-items: center;
  cursor: pointer;
  transition: background var(--duration-fast) ease, transform var(--duration-fast) ease;
  border: 1px solid var(--glass-border);
}

.top-bar__btn:hover {
  background: var(--glass-hover);
  transform: scale(1.05);
}

.top-bar__btn:active {
  transform: scale(0.95);
}

.top-bar__source {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  font-family: var(--font-display);
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--text-secondary);
}

.top-bar__source-dot {
  width: 6px;
  height: 6px;
  border-radius: var(--radius-full);
  background: #1db954;
  animation: pulse-dot 2s ease-in-out infinite;
}

@keyframes pulse-dot {
  0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(29, 185, 84, 0.4); }
  50%      { opacity: 0.7; box-shadow: 0 0 0 6px rgba(29, 185, 84, 0); }
}

/* ============================================================
   ALBUM ART
   ============================================================ */
.album-section {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: var(--sp-4) 0;
  perspective: 800px;
}

.album-art-container {
  position: relative;
  width: 280px;
  height: 280px;
  flex-shrink: 0;
}

/* Reflection / glow beneath */
.album-art-container::before {
  content: '';
  position: absolute;
  bottom: -30px;
  left: 10%;
  width: 80%;
  height: 60px;
  background: var(--accent-primary);
  filter: blur(40px);
  opacity: 0.4;
  border-radius: 50%;
  animation: albumGlow 4s ease-in-out infinite alternate;
}

@keyframes albumGlow {
  0%   { opacity: 0.3; transform: scaleX(0.9); }
  100% { opacity: 0.5; transform: scaleX(1.1); }
}

.album-art {
  width: 100%;
  height: 100%;
  border-radius: var(--radius-lg);
  overflow: hidden;
  position: relative;
  box-shadow:
    0 8px 32px rgba(0,0,0,0.5),
    0 2px 8px rgba(0,0,0,0.3);
  animation: albumFloat 6s ease-in-out infinite;
  border: 1px solid rgba(255,255,255,0.06);
}

@keyframes albumFloat {
  0%, 100% { transform: translateY(0px) rotateX(0deg); }
  50%      { transform: translateY(-6px) rotateX(1deg); }
}

/* Placeholder album art using CSS gradient art — simulates an abstract album cover */
.album-art__image {
  width: 100%;
  height: 100%;
  background:
    radial-gradient(ellipse at 25% 30%, #6d28d9 0%, transparent 50%),
    radial-gradient(ellipse at 75% 70%, #be185d 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, #1e1b4b 0%, transparent 70%),
    linear-gradient(160deg, #0c0a1d 0%, #1a0533 30%, #2d1b69 60%, #0c0a1d 100%);
  position: relative;
  overflow: hidden;
}

/* Decorative pattern — layered abstract shapes */
.album-art__image::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    radial-gradient(circle at 25% 35%, rgba(255,255,255,0.15) 0%, transparent 30%),
    radial-gradient(circle at 80% 20%, rgba(124, 58, 237, 0.4) 0%, transparent 25%),
    radial-gradient(circle at 60% 75%, rgba(192, 38, 211, 0.35) 0%, transparent 30%),
    radial-gradient(circle at 40% 55%, rgba(37, 99, 235, 0.2) 0%, transparent 35%);
}

/* Abstract geometric element in center */
.album-art__image::after {
  content: '';
  position: absolute;
  top: 50%;
  left: 50%;
  width: 100px;
  height: 100px;
  border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
  background: linear-gradient(135deg, rgba(124,58,237,0.4), rgba(192,38,211,0.3));
  transform: translate(-50%, -50%) rotate(-15deg);
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(4px);
  animation: morphBlob 8s ease-in-out infinite;
}

@keyframes morphBlob {
  0%, 100% { border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; transform: translate(-50%, -50%) rotate(-15deg); }
  25%      { border-radius: 50% 50% 30% 70% / 60% 40% 60% 40%; transform: translate(-50%, -50%) rotate(5deg); }
  50%      { border-radius: 70% 30% 50% 50% / 40% 60% 40% 60%; transform: translate(-50%, -50%) rotate(-5deg); }
  75%      { border-radius: 40% 60% 60% 40% / 70% 30% 70% 30%; transform: translate(-50%, -50%) rotate(10deg); }
}

/* Shine overlay on album art */
.album-art::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    135deg,
    rgba(255,255,255,0.08) 0%,
    transparent 50%,
    transparent 100%
  );
  border-radius: var(--radius-lg);
  pointer-events: none;
}

/* ============================================================
   TRACK INFO
   ============================================================ */
.track-info {
  text-align: center;
  padding: var(--sp-5) 0 var(--sp-3);
  flex-shrink: 0;
}

.track-info__title {
  font-family: var(--font-display);
  font-size: 1.35rem;
  font-weight: 700;
  letter-spacing: -0.02em;
  line-height: 1.3;
  margin-bottom: var(--sp-1);
  background: linear-gradient(
    135deg,
    var(--text-primary) 0%,
    rgba(255,255,255,0.75) 100%
  );
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.track-info__artist {
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--text-secondary);
  letter-spacing: 0.01em;
}

.track-info__artist span {
  color: var(--accent-primary);
  font-weight: 500;
  cursor: pointer;
  transition: color var(--duration-fast) ease;
}

.track-info__artist span:hover {
  color: var(--accent-secondary);
}

/* ============================================================
   PROGRESS BAR
   ============================================================ */
.progress-section {
  padding: var(--sp-4) 0 var(--sp-2);
  flex-shrink: 0;
}

.progress-bar {
  position: relative;
  width: 100%;
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: var(--radius-full);
  cursor: pointer;
  overflow: visible;
  transition: height var(--duration-fast) var(--ease-out-expo);
}

.progress-bar__fill {
  height: 100%;
  width: 62%;
  border-radius: var(--radius-full);
  background: linear-gradient(
    90deg,
    var(--accent-primary),
    var(--accent-secondary)
  );
  position: relative;
  transition: width 0.1s linear;
}

/* Glow on the progress fill */
.progress-bar__fill::before {
  content: '';
  position: absolute;
  right: 0;
  top: 50%;
  width: 40px;
  height: 8px;
  background: var(--accent-secondary);
  filter: blur(8px);
  transform: translateY(-50%);
  opacity: 0.6;
}

/* Thumb / scrubber */
.progress-bar__thumb {
  position: absolute;
  right: -7px;
  top: 50%;
  width: 14px;
  height: 14px;
  border-radius: 50%;
  background: #fff;
  transform: translateY(-50%) scale(0);
  transition: transform var(--duration-fast) var(--ease-out-expo);
  box-shadow:
    0 0 0 4px rgba(124, 58, 237, 0.3),
    0 2px 8px rgba(0,0,0,0.4);
}

.progress-bar:hover .progress-bar__thumb,
.progress-bar:active .progress-bar__thumb {
  transform: translateY(-50%) scale(1);
}

.progress-bar:hover {
  height: 6px;
}

.progress-times {
  display: flex;
  justify-content: space-between;
  padding-top: var(--sp-2);
  font-size: 0.7rem;
  font-weight: 500;
  color: var(--text-tertiary);
  font-variant-numeric: tabular-nums;
  letter-spacing: 0.02em;
}

/* ============================================================
   PLAYBACK CONTROLS
   ============================================================ */
.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: var(--sp-8);
  padding: var(--sp-5) 0;
  flex-shrink: 0;
}

.ctrl-btn {
  border: none;
  background: none;
  color: var(--text-secondary);
  cursor: pointer;
  display: grid;
  place-items: center;
  transition: all var(--duration-fast) var(--ease-out-expo);
  padding: var(--sp-2);
  -webkit-tap-highlight-color: transparent;
}

.ctrl-btn:hover {
  color: var(--text-primary);
  transform: scale(1.1);
}

.ctrl-btn:active {
  transform: scale(0.9);
}

.ctrl-btn svg {
  width: 24px;
  height: 24px;
  fill: currentColor;
}

/* Play/Pause — the hero button */
.ctrl-btn--play {
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: linear-gradient(
    135deg,
    var(--accent-primary) 0%,
    var(--accent-secondary) 100%
  );
  color: #fff;
  position: relative;
  box-shadow:
    0 4px 20px rgba(124, 58, 237, 0.4),
    0 1px 3px rgba(0,0,0,0.3);
}

.ctrl-btn--play::before {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
  opacity: 0;
  filter: blur(12px);
  transition: opacity var(--duration-normal) ease;
  z-index: -1;
}

.ctrl-btn--play:hover::before {
  opacity: 0.5;
}

.ctrl-btn--play:hover {
  transform: scale(1.08);
  box-shadow:
    0 6px 28px rgba(124, 58, 237, 0.5),
    0 2px 6px rgba(0,0,0,0.3);
}

.ctrl-btn--play:active {
  transform: scale(0.95);
}

.ctrl-btn--play svg {
  width: 28px;
  height: 28px;
  /* Slight optical offset for play icon */
  margin-left: 2px;
}

/* ============================================================
   SECONDARY CONTROLS
   ============================================================ */
.secondary-controls {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: var(--sp-2) var(--sp-4);
  flex-shrink: 0;
}

.sec-btn {
  border: none;
  background: none;
  color: var(--text-tertiary);
  cursor: pointer;
  padding: var(--sp-2);
  display: grid;
  place-items: center;
  transition: all var(--duration-fast) ease;
  -webkit-tap-highlight-color: transparent;
  position: relative;
}

.sec-btn:hover {
  color: var(--text-secondary);
}

.sec-btn:active {
  transform: scale(0.9);
}

.sec-btn--active {
  color: var(--accent-primary);
}

.sec-btn--active::after {
  content: '';
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--accent-primary);
}

.sec-btn svg {
  width: 20px;
  height: 20px;
  fill: currentColor;
}

/* ============================================================
   BOTTOM GLASS CARD — Lyrics Peek / Queue
   ============================================================ */
.bottom-card {
  margin-top: auto;
  background: var(--glass-bg);
  backdrop-filter: blur(20px) saturate(1.5);
  -webkit-backdrop-filter: blur(20px) saturate(1.5);
  border: 1px solid var(--glass-border);
  border-radius: var(--radius-md);
  padding: var(--sp-4);
  flex-shrink: 0;
  cursor: pointer;
  transition: all var(--duration-normal) var(--ease-out-expo);
}

.bottom-card:hover {
  background: var(--glass-hover);
  border-color: rgba(255,255,255,0.12);
  transform: translateY(-2px);
}

.bottom-card__header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--sp-3);
}

.bottom-card__label {
  font-family: var(--font-display);
  font-size: 0.65rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.12em;
  color: var(--accent-primary);
}

.bottom-card__expand {
  font-size: 0.65rem;
  color: var(--text-tertiary);
  font-weight: 500;
}

.bottom-card__lyric {
  font-size: 0.95rem;
  font-weight: 300;
  line-height: 1.6;
  color: var(--text-secondary);
}

.bottom-card__lyric em {
  color: var(--text-primary);
  font-style: normal;
  font-weight: 500;
}

/* ============================================================
   VISUALIZER BARS (decorative, behind album art)
   ============================================================ */
.visualizer {
  position: absolute;
  bottom: 180px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 3px;
  align-items: flex-end;
  height: 30px;
  opacity: 0.15;
  z-index: 0;
  pointer-events: none;
}

.visualizer__bar {
  width: 3px;
  background: linear-gradient(to top, var(--accent-primary), var(--accent-secondary));
  border-radius: 2px;
  animation: vizBounce var(--dur, 0.8s) ease-in-out infinite alternate;
}

@keyframes vizBounce {
  0%   { height: var(--min-h, 4px); }
  100% { height: var(--max-h, 20px); }
}

/* ============================================================
   RESPONSIVE ADJUSTMENTS
   ============================================================ */
@media (max-width: 400px) {
  .phone-frame {
    width: 100vw;
    height: 100dvh;
    border-radius: 0;
    box-shadow: none;
  }
}

@media (min-width: 401px) and (max-height: 750px) {
  .album-art-container {
    width: 220px;
    height: 220px;
  }
}

/* ============================================================
   SUBTLE NOISE TEXTURE
   ============================================================ */
.noise-overlay {
  position: absolute;
  inset: 0;
  z-index: 0;
  opacity: 0.025;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 128px 128px;
}
</style>
</head>
<body>

<div class="phone-frame">
  <!-- Noise texture for tactile depth -->
  <div class="noise-overlay"></div>

  <!-- Ambient gradient mesh background (simulates album-art color extraction) -->
  <div class="ambient-bg"></div>

  <!-- Decorative audio visualizer -->
  <div class="visualizer">
    <div class="visualizer__bar" style="--dur:0.6s;--min-h:3px;--max-h:18px"></div>
    <div class="visualizer__bar" style="--dur:0.8s;--min-h:5px;--max-h:28px"></div>
    <div class="visualizer__bar" style="--dur:0.5s;--min-h:4px;--max-h:22px"></div>
    <div class="visualizer__bar" style="--dur:0.9s;--min-h:6px;--max-h:15px"></div>
    <div class="visualizer__bar" style="--dur:0.7s;--min-h:3px;--max-h:26px"></div>
    <div class="visualizer__bar" style="--dur:1.0s;--min-h:5px;--max-h:12px"></div>
    <div class="visualizer__bar" style="--dur:0.55s;--min-h:4px;--max-h:20px"></div>
    <div class="visualizer__bar" style="--dur:0.85s;--min-h:6px;--max-h:24px"></div>
    <div class="visualizer__bar" style="--dur:0.65s;--min-h:3px;--max-h:16px"></div>
    <div class="visualizer__bar" style="--dur:0.75s;--min-h:5px;--max-h:22px"></div>
    <div class="visualizer__bar" style="--dur:0.9s;--min-h:4px;--max-h:14px"></div>
    <div class="visualizer__bar" style="--dur:0.5s;--min-h:3px;--max-h:26px"></div>
    <div class="visualizer__bar" style="--dur:0.8s;--min-h:6px;--max-h:18px"></div>
    <div class="visualizer__bar" style="--dur:0.6s;--min-h:4px;--max-h:22px"></div>
    <div class="visualizer__bar" style="--dur:0.95s;--min-h:5px;--max-h:12px"></div>
    <div class="visualizer__bar" style="--dur:0.7s;--min-h:3px;--max-h:20px"></div>
  </div>

  <!-- Main content -->
  <div class="now-playing">

    <!-- Top bar -->
    <div class="top-bar">
      <button class="top-bar__btn" aria-label="Back">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"></polyline>
        </svg>
      </button>

      <div class="top-bar__source">
        <span class="top-bar__source-dot"></span>
        Playing from Spotify
      </div>

      <button class="top-bar__btn" aria-label="More options">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor">
          <circle cx="12" cy="5" r="1.5"></circle>
          <circle cx="12" cy="12" r="1.5"></circle>
          <circle cx="12" cy="19" r="1.5"></circle>
        </svg>
      </button>
    </div>

    <!-- Album art -->
    <div class="album-section">
      <div class="album-art-container">
        <div class="album-art">
          <div class="album-art__image"></div>
        </div>
      </div>
    </div>

    <!-- Track info -->
    <div class="track-info">
      <h1 class="track-info__title">Midnight Reverie</h1>
      <p class="track-info__artist"><span>AURORA</span> &middot; The Gods We Can Touch</p>
    </div>

    <!-- Progress -->
    <div class="progress-section">
      <div class="progress-bar" role="slider" aria-label="Playback progress" aria-valuenow="62" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar__fill">
          <div class="progress-bar__thumb"></div>
        </div>
      </div>
      <div class="progress-times">
        <span>2:14</span>
        <span>-1:22</span>
      </div>
    </div>

    <!-- Primary controls -->
    <div class="controls">
      <!-- Shuffle -->
      <button class="ctrl-btn" aria-label="Shuffle">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/>
        </svg>
      </button>

      <!-- Previous -->
      <button class="ctrl-btn" aria-label="Previous track">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
        </svg>
      </button>

      <!-- Play / Pause -->
      <button class="ctrl-btn ctrl-btn--play" aria-label="Pause">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>

      <!-- Next -->
      <button class="ctrl-btn" aria-label="Next track">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
        </svg>
      </button>

      <!-- Repeat -->
      <button class="ctrl-btn" aria-label="Repeat">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/>
        </svg>
      </button>
    </div>

    <!-- Secondary controls -->
    <div class="secondary-controls">
      <!-- Device / cast -->
      <button class="sec-btn" aria-label="Connect to device">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M6 22h12a2 2 0 002-2V4a2 2 0 00-2-2H6a2 2 0 00-2 2v16a2 2 0 002 2zm0-2V4h12v16H6zm2-2h8v-2H8v2z"/>
        </svg>
      </button>

      <!-- Heart / like -->
      <button class="sec-btn sec-btn--active" aria-label="Liked">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
        </svg>
      </button>

      <!-- Lyrics -->
      <button class="sec-btn" aria-label="Lyrics">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zM6 20V4h7v5h5v11H6zm2-6h8v2H8v-2zm0-4h8v2H8v-2z"/>
        </svg>
      </button>

      <!-- Queue -->
      <button class="sec-btn" aria-label="Queue">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/>
        </svg>
      </button>

      <!-- Share -->
      <button class="sec-btn" aria-label="Share">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/>
        </svg>
      </button>
    </div>

    <!-- Bottom lyrics peek card -->
    <div class="bottom-card">
      <div class="bottom-card__header">
        <span class="bottom-card__label">Lyrics</span>
        <span class="bottom-card__expand">Tap to expand</span>
      </div>
      <p class="bottom-card__lyric">
        <em>Running through the silver rain,</em><br>
        where the echoes call my name...
      </p>
    </div>

  </div>
</div>

</body>
</html>
